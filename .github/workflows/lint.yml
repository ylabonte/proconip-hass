name: Lint

on:
  push:
  pull_request:
  workflow_call:

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # 3.14 to match the test matrix and pyproject.toml's mypy
          # python_version. The HA core source mypy follows uses
          # 3.14-only syntax (PEP 758 parenthesized except expressions).
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        # [dev,test] so the test extra pulls in homeassistant transitively
        # (via pytest-homeassistant-custom-component) — without it mypy
        # can't resolve `homeassistant.*` imports.
        run: pip install -e ".[dev,test]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        run: mypy custom_components/proconip_pool_controller
