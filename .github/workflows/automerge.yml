name: Auto-Merge Dependabot + Actions-Updater PRs

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    name: Auto-approve and merge
    runs-on: ubuntu-latest
    # Two bots are allowed to skip review:
    # - dependabot[bot]: opens pip dep bump PRs
    # - github-actions[bot]: opens the update-actions.yml PR via
    #   peter-evans/create-pull-request (always on a known branch name)
    # Stash the head ref in env so the branch comparison happens in shell,
    # not in a YAML interpolation (defense against ref-based injection).
    env:
      HEAD_REF: ${{ github.head_ref }}
    if: >-
      github.actor == 'dependabot[bot]' ||
      (github.actor == 'github-actions[bot]' &&
       startsWith(github.head_ref, 'chore/update-github-actions'))
    steps:
      - name: Approve PR
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr review --approve "$PR_URL"

      - name: Enable auto-merge (squash)
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --squash --auto "$PR_URL"
